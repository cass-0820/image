<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 PC 속 이미지 편집기 Pro Max (Dark)</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <style>
        /* 기본(라이트 모드) 테마 변수 설정 */
        :root {
            --bg-color: #f0f2f5;
            --text-color: #333;
            --panel-bg: white;
            --panel-shadow: rgba(0,0,0,0.05);
            --img-bg: #e0e0e0;
            --radio-bg: #e8eaf6;
            --radio-border: #c5cae9;
            --radio-hover: #c5cae9;
            --input-bg: white;
            --input-border: #ccc;
            --input-disabled: #f5f5f5;
            --input-disabled-text: #999;
            --format-bg: #e0f2f1;
            --format-border: #b2dfdb;
            --format-hover: #b2dfdb;
            --lock-bg: #fff3e0;
            --lock-border: #ffe0b2;
            --lock-text: #e65100;
            --lock-hover: #ffe0b2;
            --divider: #eee;
            --title-color: #1a237e;
            --desc-color: #7f8c8d;
        }

        /* 다크 모드 테마 변수 설정 */
        body.dark-mode {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --panel-bg: #1e1e1e;
            --panel-shadow: rgba(0,0,0,0.5);
            --img-bg: #2c2c2c;
            --radio-bg: #333;
            --radio-border: #555;
            --radio-hover: #444;
            --input-bg: #333;
            --input-border: #555;
            --input-disabled: #222;
            --input-disabled-text: #777;
            --format-bg: #263238;
            --format-border: #37474f;
            --format-hover: #37474f;
            --lock-bg: #3e2723;
            --lock-border: #4e342e;
            --lock-text: #ffb74d;
            --lock-hover: #4e342e;
            --divider: #444;
            --title-color: #90caf9;
            --desc-color: #aaa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }
        
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        h1 { margin: 0; color: var(--title-color); transition: color 0.3s; }
        
        /* 테마 변경 버튼 스타일 */
        #theme-toggle {
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            background-color: #333;
            color: white;
            transition: all 0.3s;
        }
        body.dark-mode #theme-toggle {
            background-color: #f1c40f;
            color: #333;
        }

        .panel {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 12px var(--panel-shadow);
            margin-bottom: 20px;
            transition: background 0.3s, box-shadow 0.3s;
        }
        .img-container {
            max-width: 100%;
            max-height: 500px;
            margin-bottom: 20px;
            background-color: var(--img-bg);
            border-radius: 8px;
            overflow: hidden;
            transition: background 0.3s;
        }
        img { max-width: 100%; }
        
        .radio-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; align-items: center; }
        .radio-label {
            cursor: pointer; padding: 8px 12px; background-color: var(--radio-bg);
            border-radius: 6px; border: 1px solid var(--radio-border); transition: all 0.2s; font-size: 14px;
            color: var(--text-color);
        }
        .radio-label:hover { background-color: var(--radio-hover); }
        input[type="radio"]:checked + .radio-label {
            background-color: #3f51b5; color: white; border-color: #3f51b5; font-weight: bold;
        }
        input[type="radio"] { display: none; }

        .format-label { background-color: var(--format-bg); border-color: var(--format-border); }
        .format-label:hover { background-color: var(--format-hover); }
        input[type="radio"]:checked + .format-label { background-color: #00897b; border-color: #00897b; }

        .input-group { display: inline-flex; align-items: center; margin-right: 15px; margin-bottom: 10px; }
        input[type="number"] { 
            width: 80px; padding: 8px; border: 1px solid var(--input-border); 
            border-radius: 4px; margin-left: 8px; background-color: var(--input-bg); color: var(--text-color);
        }
        input[type="number"]:disabled { background-color: var(--input-disabled); color: var(--input-disabled-text); }
        
        .lock-label {
            cursor: pointer; display: inline-flex; align-items: center;
            font-size: 14px; color: var(--lock-text); font-weight: bold;
            background: var(--lock-bg); padding: 8px 12px; border-radius: 6px;
            border: 1px solid var(--lock-border); transition: all 0.2s; user-select: none;
        }
        .lock-label:hover { background: var(--lock-hover); }
        .lock-label.disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(100%); }
        .lock-label input { margin-right: 8px; cursor: pointer; }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        button {
            padding: 12px 24px; border: none; border-radius: 6px; font-size: 16px;
            font-weight: bold; cursor: pointer; transition: transform 0.1s, background 0.3s;
        }
        button:active { transform: scale(0.98); }
        .btn-primary { background-color: #3f51b5; color: white; }
        .btn-primary:hover { background-color: #303f9f; }
        .btn-secondary { background-color: #ff9800; color: white; }
        .btn-secondary:hover { background-color: #f57c00; }
        
        .section-title { font-weight: bold; font-size: 18px; margin-bottom: 15px; color: var(--text-color); transition: color 0.3s; }
        .divider { height: 1px; background-color: var(--divider); margin: 20px 0; transition: background 0.3s; }
        .help-text { font-size: 13px; color: var(--desc-color); margin-top: 15px; line-height: 1.5; transition: color 0.3s; }
    </style>
</head>
<body class="dark-mode">

    <div class="header-container">
        <h1>이미지 크롭 & 분할 에디터</h1>
        <button id="theme-toggle">☀️ 라이트 모드 켜기</button>
    </div>

    <div class="panel">
        <div class="section-title">1. 이미지 불러오기</div>
        <input type="file" id="upload" accept="image/*" style="color: var(--text-color);">
    </div>

    <div class="img-container" id="img-container" style="display:none;">
        <img id="image" src="">
    </div>

    <div class="panel" id="edit-controls" style="display:none;">
        <div class="section-title">2. 해상도 선택 (즐겨찾기)</div>
        
        <div class="radio-group">
            <label>
                <input type="radio" name="preset" value="custom" checked>
                <span class="radio-label">✍️ 직접 입력 (자유 비율)</span>
            </label>
            <label>
                <input type="radio" name="preset" value="3072x3072" data-ratio="1">
                <span class="radio-label">1️⃣ 3072 x 3072</span>
            </label>
            <label>
                <input type="radio" name="preset" value="1400x2100" data-ratio="0.6666666667">
                <span class="radio-label">2️⃣ 1400 x 2100</span>
            </label>
            <label>
                <input type="radio" name="preset" value="3840x3840" data-ratio="1">
                <span class="radio-label">3️⃣ 3840 x 3840</span>
            </label>
            <label>
                <input type="radio" name="preset" value="2304x3840" data-ratio="0.6">
                <span class="radio-label">4️⃣ 2304 x 3840</span>
            </label>
        </div>

        <div style="display: flex; align-items: center; flex-wrap: wrap;">
            <div class="input-group">
                <label for="width">가로:</label>
                <input type="number" id="width" min="1"> px
            </div>
            <div class="input-group">
                <label for="height">세로:</label>
                <input type="number" id="height" min="1"> px
            </div>
            <div class="input-group" style="margin-bottom: 10px;">
                <label class="lock-label" id="lock-wrapper">
                    <input type="checkbox" id="lock-custom"> 🔒 입력한 숫자 및 비율 고정
                </label>
            </div>
        </div>
        <p class="help-text" style="margin-top: 5px;">* 직접 입력 모드에서 원하시는 해상도를 입력한 후 <b>'고정'</b>을 체크하면, 박스를 움직여도 숫자가 바뀌지 않습니다.</p>

        <div class="divider"></div>

        <div class="section-title">3. 저장 포맷 및 다운로드</div>
        
        <div class="radio-group">
            <span style="font-weight: 600; margin-right: 5px; font-size: 14px;">파일 형식:</span>
            <label>
                <input type="radio" name="format" value="png" checked>
                <span class="radio-label format-label">PNG (고화질/투명도)</span>
            </label>
            <label>
                <input type="radio" name="format" value="jpeg">
                <span class="radio-label format-label">JPEG (사진/용량최적화)</span>
            </label>
            <label>
                <input type="radio" name="format" value="webp">
                <span class="radio-label format-label">WEBP (웹용 초고효율)</span>
            </label>
        </div>

        <div class="btn-group">
            <button class="btn-primary" id="download-single">💾 현재 영역 한 장으로 저장</button>
            <button class="btn-secondary" id="download-split">🔲 해상도 유지하며 4장으로 분할 저장</button>
        </div>
        <p class="help-text">
            * <b>해상도 유지 4장 분할:</b> 1/4 조각으로 자른 이미지를 <b>선택한 원본 해상도 크기로 다시 확대(업스케일링)</b>하여 4장으로 저장합니다.<br>
            예) 1400x2100 설정 시, 4장의 이미지 모두 각각 1400x2100 해상도로 저장됩니다.
        </p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script>
        // --- 테마 토글 로직 ---
        const themeToggleBtn = document.getElementById('theme-toggle');
        themeToggleBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            if (document.body.classList.contains('dark-mode')) {
                themeToggleBtn.innerText = '☀️ 라이트 모드 켜기';
            } else {
                themeToggleBtn.innerText = '🌙 다크 모드 켜기';
            }
        });

        // --- 크로퍼 에디터 로직 ---
        let cropper;
        const uploadInput = document.getElementById('upload');
        const image = document.getElementById('image');
        const editControls = document.getElementById('edit-controls');
        const imgContainer = document.getElementById('img-container');
        const widthInput = document.getElementById('width');
        const heightInput = document.getElementById('height');
        const presetRadios = document.querySelectorAll('input[name="preset"]');
        const lockCustomCheckbox = document.getElementById('lock-custom');
        const lockWrapper = document.getElementById('lock-wrapper');

        uploadInput.addEventListener('change', function (e) {
            const files = e.target.files;
            if (files && files.length > 0) {
                const file = files[0];
                const reader = new FileReader();

                reader.onload = function (e) {
                    image.src = e.target.result;
                    imgContainer.style.display = 'block';
                    editControls.style.display = 'block';

                    if (cropper) { cropper.destroy(); }

                    cropper = new Cropper(image, {
                        viewMode: 1,
                        autoCropArea: 0.8,
                        crop(event) {
                            const selectedPreset = document.querySelector('input[name="preset"]:checked').value;
                            if (selectedPreset === 'custom' && !lockCustomCheckbox.checked) {
                                widthInput.value = Math.round(event.detail.width);
                                heightInput.value = Math.round(event.detail.height);
                            }
                        }
                    });
                    
                    document.querySelector('input[value="custom"]').checked = true;
                    widthInput.disabled = false;
                    heightInput.disabled = false;
                    lockCustomCheckbox.checked = false; 
                    updateLockUI(false);
                };
                reader.readAsDataURL(file);
            }
        });

        lockCustomCheckbox.addEventListener('change', function() {
            if (!cropper) return;
            const isCustom = document.querySelector('input[name="preset"]:checked').value === 'custom';
            
            if (isCustom) {
                if (this.checked) {
                    const w = parseFloat(widthInput.value) || 1;
                    const h = parseFloat(heightInput.value) || 1;
                    cropper.setAspectRatio(w / h);
                } else {
                    cropper.setAspectRatio(NaN);
                    widthInput.value = Math.round(cropper.getData().width);
                    heightInput.value = Math.round(cropper.getData().height);
                }
            }
        });

        function updateRatioIfLocked() {
            if (lockCustomCheckbox.checked && document.querySelector('input[name="preset"]:checked').value === 'custom') {
                const w = parseFloat(widthInput.value) || 1;
                const h = parseFloat(heightInput.value) || 1;
                cropper.setAspectRatio(w / h);
            }
        }
        widthInput.addEventListener('input', updateRatioIfLocked);
        heightInput.addEventListener('input', updateRatioIfLocked);

        function updateLockUI(disabled) {
            lockCustomCheckbox.disabled = disabled;
            if (disabled) {
                lockWrapper.classList.add('disabled');
            } else {
                lockWrapper.classList.remove('disabled');
            }
        }

        presetRadios.forEach(radio => {
            radio.addEventListener('change', function() {
                if (!cropper) return;

                if (this.value === 'custom') {
                    updateLockUI(false);
                    widthInput.disabled = false;
                    heightInput.disabled = false;
                    
                    if (lockCustomCheckbox.checked) {
                        const w = parseFloat(widthInput.value) || 1;
                        const h = parseFloat(heightInput.value) || 1;
                        cropper.setAspectRatio(w / h);
                    } else {
                        cropper.setAspectRatio(NaN);
                        widthInput.value = Math.round(cropper.getData().width);
                        heightInput.value = Math.round(cropper.getData().height);
                    }
                } else {
                    const dimensions = this.value.split('x');
                    widthInput.value = parseInt(dimensions[0]);
                    heightInput.value = parseInt(dimensions[1]);
                    widthInput.disabled = true;
                    heightInput.disabled = true;
                    
                    updateLockUI(true); 
                    cropper.setAspectRatio(parseFloat(this.dataset.ratio));
                }
            });
        });

        function downloadCanvasAsImage(canvas, baseFilename) {
            const format = document.querySelector('input[name="format"]:checked').value;
            const mimeType = `image/${format}`;
            const extension = format === 'jpeg' ? 'jpg' : format;
            const finalFilename = `${baseFilename}.${extension}`;
            const quality = 0.9; 

            canvas.toBlob(function (blob) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = finalFilename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, mimeType, quality);
        }

        document.getElementById('download-single').addEventListener('click', function () {
            if (!cropper) return;

            const targetWidth = parseInt(widthInput.value);
            const targetHeight = parseInt(heightInput.value);

            if (!targetWidth || !targetHeight) {
                alert("가로와 세로 해상도를 확인해주세요."); return;
            }

            const croppedCanvas = cropper.getCroppedCanvas();
            const resizedCanvas = document.createElement('canvas');
            resizedCanvas.width = targetWidth;
            resizedCanvas.height = targetHeight;
            const ctx = resizedCanvas.getContext('2d');
            
            const format = document.querySelector('input[name="format"]:checked').value;
            if(format === 'jpeg') {
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(0, 0, targetWidth, targetHeight);
            }
            
            ctx.drawImage(croppedCanvas, 0, 0, targetWidth, targetHeight);
            downloadCanvasAsImage(resizedCanvas, 'edited_image');
        });

        document.getElementById('download-split').addEventListener('click', function () {
            if (!cropper) return;

            const targetWidth = parseInt(widthInput.value);
            const targetHeight = parseInt(heightInput.value);
            const originalCroppedCanvas = cropper.getCroppedCanvas();
            
            const baseCanvas = document.createElement('canvas');
            baseCanvas.width = targetWidth;
            baseCanvas.height = targetHeight;
            const baseCtx = baseCanvas.getContext('2d');

            const format = document.querySelector('input[name="format"]:checked').value;
            if(format === 'jpeg') {
                baseCtx.fillStyle = '#FFFFFF';
                baseCtx.fillRect(0, 0, targetWidth, targetHeight);
            }

            baseCtx.drawImage(originalCroppedCanvas, 0, 0, targetWidth, targetHeight);

            const halfW = Math.floor(targetWidth / 2);
            const halfH = Math.floor(targetHeight / 2);
            
            const pieces = [
                { x: 0, y: 0, name: '1_top_left' },
                { x: halfW, y: 0, name: '2_top_right' },
                { x: 0, y: halfH, name: '3_bottom_left' },
                { x: halfW, y: halfH, name: '4_bottom_right' }
            ];

            pieces.forEach((piece, index) => {
                const pieceCanvas = document.createElement('canvas');
                pieceCanvas.width = targetWidth;
                pieceCanvas.height = targetHeight;
                const ctx = pieceCanvas.getContext('2d');
                
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';

                ctx.drawImage(baseCanvas, piece.x, piece.y, halfW, halfH, 0, 0, targetWidth, targetHeight);

                setTimeout(() => {
                    downloadCanvasAsImage(pieceCanvas, `split_image_${piece.name}`);
                }, index * 300);
            });
        });
    </script>
</body>
</html>
